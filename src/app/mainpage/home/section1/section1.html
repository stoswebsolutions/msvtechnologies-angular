<div id="heroCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img [src]="imageBaseurl+'images/carouselimg-1.jpg'" class="d-block w-100 hero-img" alt="Slide 1">
      <div class="overlay"></div>
      <div class="carousel-caption hero-content">
        <h2 class="sub-title">UNLOCK YOUR POTENTIAL, EMBRACE INNOVATION</h2>
        <h1>Join Us on the Journey<br>to Tech Excellence</h1>
        <div class="hero-buttons">
          <a routerLink="/career" class="btn btn-primary btn-lg me-3">Career</a>
          <a  routerLink="/contact" class="btn btn-light btn-lg">Contact Us</a>
        </div>
      </div>
    </div>
    <!-- Slide 2 -->
    <div class="carousel-item">
      <img [src]="imageBaseurl+'images/carouselimg-2.jpg'" class="d-block w-100 hero-img" alt="Slide 2">
      <div class="overlay"></div>
      <div class="carousel-caption hero-content">
        <h2 class="sub-title">Unlock Your Potential, Embrace Innovation</h2>
        <h1>Join Us on the Journey to Tech Excellence</h1>
        <div class="hero-buttons">
          <a  routerLink="/career" class="btn btn-primary btn-lg me-3">Career</a>
          <a  routerLink="/contact" class="btn btn-light btn-lg">Contact Us</a>
        </div>
      </div>
    </div>
  </div>
  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
<div class="mt-3"></div>
<section class="webinar-section">
  <div class="container">
    <div class="fade-effect">
      <h1>Webinar on Medical Coding</h1>
      <p class="sub-text">Join our expert session and boost your healthcare career</p>
    </div>
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10 col-12">
        <div class="video-box">
          <video autoplay  loop playsinline controls>
            <source [src]="imageBaseurl+'images/medical.mp4'" type="video/mp4">
          </video>
        </div>
      </div>
    </div>
  </div>
</section>
