<section class="career-section">
  <div class="container text-center">
    <div class="career-header">
      <span class="career-tag">Join Our Team</span>
      <h6 class="career-title">
        Build Your Career With
        <span>MSV Technologies</span>
      </h6>
    </div>
    <div class="career-wrapper">

      <!-- Left Content -->
      <div class="career-content">
         <form class="career-form">
          <div class="input-group-custom">
            <i class="bi bi-person"></i>
            <input type="text" placeholder="Full Name">
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="input-group-custom">
                <i class="bi bi-envelope"></i>
                <input type="email" placeholder="Email Address">
              </div>
            </div>

            <div class="col-md-6 mt-3 mt-md-0">
              <div class="input-group-custom">
                <i class="bi bi-telephone"></i>
                <input type="text" placeholder="Phone Number">
              </div>
            </div>
          </div>

          <div class="input-group-custom mt-3">
            <i class="bi bi-briefcase"></i>
            <select>
              <option selected disabled>Choose Interest Area</option>
              <option>UI/UX Designer</option>
              <option>Frontend Developer</option>
              <option>Backend Developer</option>
              <option>Mobile App Developer</option>
              <option>Digital Marketing</option>
              <option>SEO Specialist</option>
              <option>Other</option>
            </select>
          </div>

          <div class="upload-box mt-3">
            <label for="resumeUpload">
              <i class="bi bi-cloud-arrow-up"></i>
              <span>Upload Your Resume</span>
              <small>PDF, DOC, DOCX (Max 5MB)</small>
            </label>
            <input type="file" id="resumeUpload">
          </div>

          <button type="submit" class="career-btn">
            Submit Resume
            <i class="bi bi-arrow-right"></i>
          </button>

        </form>


      </div>
      <!-- Right Image -->
      <div class="career-image">
        <div class="image-card">
          <img [src]="imagbaseurl+'images/resume.jpg'" alt="Career Opportunities">
        
        </div>

        <div class="floating-card top-card">
          <i class="bi bi-briefcase-fill"></i>
          <div>
            <h5>100+ Openings</h5>
            <p>Across Multiple IT Domains</p>
          </div>
        </div>

        <div class="floating-card bottom-card">
          <i class="bi bi-people-fill"></i>
          <div>
            <h5>Professional Team</h5>
            <p>Work With Industry Experts</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
